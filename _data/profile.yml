short_bio_text_justify: false
short_bio: >-
  <p>
    Mill Liao (Chih-Ting Liao) is a PhD student in Computer Science at the School of Computer Science and Engineering, University of New South Wales, and a Visiting Researcher with the NExT++ Latent Knowledge Group at the National University of Singapore. His research centers on mechanistic interpretability and latent knowledge in vision-language (VLM) and vision-language-action (VLA) models, with the broader goal of building trustworthy multimodal reasoning systems. He studies how models internally represent spatial and temporal structure, when their reasoning is genuinely grounded in visual evidence rather than driven by priors, and how these internal mechanisms can be measured and repaired. He is currently also a Research Intern at Crest Robotics.
  </p>

